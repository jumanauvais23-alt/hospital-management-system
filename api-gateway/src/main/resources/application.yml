spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: patient-service
          uri: lb://patient-service
          predicates:
            - Path=/api/patients/**

        - id: doctor-service
          uri: lb://doctor-service
          predicates:
            - Path=/api/doctors/**

        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/api/appointments/**

        - id: medical-record-service
          uri: lb://medical-record-service
          predicates:
            - Path=/api/medical-records/**


server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/




